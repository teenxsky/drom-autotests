name: Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run linters
        run: |
          make ruff-check
          make ty-check


  selenium-tests:
    name: Selenium tests
    runs-on: ubuntu-latest

    env:
      HEADLESS: "1"
      USE_SELENIUM_MANAGER: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run Selenium tests
        run: |
          make run-tests-ci
